name: Deploy to VPS on release

on:
  push:
    branches: [release]
  workflow_dispatch:

concurrency:
  group: deploy-release
  cancel-in-progress: false

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH (command-locked key runs /opt/xbridge-mcp/deploy.sh)
        env:
          KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy && chmod 600 ~/.ssh/deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            claude@"$HOST" deploy
